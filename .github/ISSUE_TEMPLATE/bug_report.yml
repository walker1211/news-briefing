name: Bug report
description: Report a reproducible problem in news-briefing
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Before submitting, remove secrets, private feed or source details, API credentials, `.env` values, `configs/config.yaml`, logs, generated briefing data, and other sensitive information.

  - type: input
    id: version
    attributes:
      label: news-briefing version
      description: Release version, commit SHA, or output from the binary if available.
      placeholder: "v0.1.0, commit abc1234, or local main"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11 + WSL, etc."
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version` if you built from source.
      placeholder: "go version go1.25.0 darwin/arm64"
    validations:
      required: false

  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Paste the command, configuration shape, or workflow that triggers the problem. Redact secrets, feed URLs, API credentials, local config values, and private paths if needed.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste only relevant log snippets. Redact tokens, auth codes, feed URLs, source details, local config values, generated briefing data, and private paths.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context that may help diagnose the issue.
    validations:
      required: false
