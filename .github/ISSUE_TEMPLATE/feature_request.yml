name: Feature request
description: Suggest an improvement or new capability for news-briefing
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please avoid including secrets, private feed or source details, API credentials, `.env` values, `configs/config.yaml`, logs, generated briefing data, or other sensitive information.

  - type: textarea
    id: scenario
    attributes:
      label: Use case
      description: What are you trying to accomplish? Describe the workflow or problem in practical terms.
      placeholder: "When using news-briefing to ..., I need ..."
    validations:
      required: true

  - type: textarea
    id: expected-capability
    attributes:
      label: Desired capability
      description: What should news-briefing be able to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds, existing commands, or other tools have you tried?
    validations:
      required: false

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and compatibility
      description: Mention relevant constraints such as local-first operation, source compatibility, output format, email delivery, scheduling, configuration compatibility, security, performance, or platform requirements.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, or screenshots if helpful. Redact sensitive information.
    validations:
      required: false
