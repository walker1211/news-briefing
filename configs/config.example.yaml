watch:
  sites:
    - name: Anthropic Claude Support
      type: anthropic_support
      home_url: https://support.claude.com/zh-CN
      briefing_category: AI/科技
      category_allowlist:
        - Claude
        - 安全保障
        - 隐私与法律
        - Claude 付费套餐
        - Claude API 与控制台
        - 团队与企业套餐
      high_value_keywords:
        - 身份验证
        - 电话验证
        - 账户限制
        - 地区可用性
        - 计费
        - 套餐
        - 配额
        - API 权限
        - 登录
        - 封禁
        - 申诉
        - 隐私
        - 数据使用
        - 训练
        - 安全策略
        - 风控
        - 团队
        - 企业
    - name: Anthropic News
      type: announcement_page
      home_url: https://www.anthropic.com/news
      briefing_category: AI/科技
      high_value_keywords:
        - Claude
        - Opus
        - Sonnet
        - model
        - API
    - name: Claude Platform Release Notes
      type: announcement_page
      home_url: https://platform.claude.com/docs/en/release-notes/overview
      briefing_category: AI/科技
      high_value_keywords:
        - Claude
        - Opus
        - Sonnet
        - API
        - release

email:
  smtp_host: smtp.example.com
  smtp_port: 465
  from: from@example.com
  to: to@example.com
  timeout: 3s
  retry_times: 3
  retry_wait_time: 500ms
  use_proxy: false

schedule:
  - "0 6 * * *"
  - "0 18 * * *"

# Optional. Defaults to the machine's local timezone when omitted.
# schedule_timezone: Asia/Shanghai

output:
  dir: output
  mode: translated_only

proxy:
  http: http://127.0.0.1:7897
  socks5: socks5://127.0.0.1:7897

ai:
  command: ccs
  args:
    - codex
  extra_flags:
    - --bare
    - --disable-slash-commands
  append_system_prompt: true
