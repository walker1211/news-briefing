output:
  dir: output
  mode: translated_only

proxy:
  http: http://127.0.0.1:7897
  socks5: socks5://127.0.0.1:7897

ai:
  command: ccs
  args:
    - codex
  extra_flags:
    - --bare
    - --disable-slash-commands
  append_system_prompt: true
